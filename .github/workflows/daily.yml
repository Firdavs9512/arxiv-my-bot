name: arXiv Daily Bot

on:
  schedule:
    # Turkiya vaqti bilan ertalab 08:00 = UTC 05:00
    # (Turkiya UTC+3, yil davomida o'zgarmaydi)
    - cron: '0 5 * * *'

  # Qo'lda ham ishga tushirish imkoniyati
  workflow_dispatch:

jobs:
  send-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Repository'ni yuklab olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Kutubxonalarni o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Botni ishga tushirish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python arxiv_bot.py
